<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Torneo</title>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #1a1a2e, #111);
  color: white;
  text-align: center;
}

h1 {
  margin: 20px 0 10px;
  font-size: 22px;
}

.progress {
  width: 85%;
  height: 6px;
  background: #333;
  margin: 10px auto 25px;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00f5a0, #00d9f5);
  transition: width 0.3s;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 100%;
  padding: 25px;
  border-radius: 25px;
  background: #1f1f35;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
  transition: transform 0.15s, opacity 0.3s;
  cursor: pointer;
  font-size: 20px;
  font-weight: 600;
}

.card:active {
  transform: scale(0.97);
}

.fade {
  opacity: 0.3;
}

.vs {
  opacity: 0.4;
  font-weight: bold;
}

.podium {
  margin-top: 30px;
}

.podium h2 {
  margin: 12px 0;
}

button {
  padding: 14px 30px;
  font-size: 16px;
  border: none;
  border-radius: 40px;
  background: linear-gradient(90deg, #00f5a0, #00d9f5);
  color: black;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🏆 Scegli</h1>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="game"></div>
<div id="result"></div>

<script>

// -------- PERSONALIZZA QUI --------
let items = [
  {name: "Pizza"},
  {name: "Poke"},
  {name: "Spezzatino"},
  {name: "Carbonara"},
  {name: "Pollo allo spiedo"},
  {name: "Lasagne"},
  {name: "Allenamento del tuo sport"},
  {name: "Manicure e Pedicure"},
  {name: "Giornata al Mare"},
  {name: "Giretto in Montagna"},
  {name: "Film al Cinema"},
  {name: "Giocare ai Videogiochi"},
  {name: "Andare a vedere il Palio"},
  {name: "Diventare famoso/a"},
  {name: "Diventare ricco/a"},
  {name: "Fare un campo da Edu"},
  {name: "Andare bene a scuola"},
  {name: "Trovare un buon lavoro"},
  {name: "Mettere su famiglia"},
  {name: "Giornata a fare shopping"},
  {name: "Passeggiata al tramonto"},
  {name: "Serata libro e tisanina"},
  {name: "Dormire fino a tardi"},
  {name: "Vedere l'alba in montagna"},
  {name: "Andare dalla parrucchiera"},
  {name: "Avere dei figli"},
  {name: "Fare un corso di cucina"},
  {name: "Imparare a fare l'uncinetto"},
  {name: "Andare a vedere l'opera"},
  {name: "Fare una donazione all'AIRC"},
  {name: "Fare una dieta sana ed essere attivi"},
  {name: "Smeccare"},
  {name: "Serata canzoni attorno al falò"},
  {name: "Andare al karaoke"},
  {name: "Essere ralizzati nel lavoro"},
  {name: "Essere sempre puntuale"},
  {name: "Vacanza con la famiglia"},
  {name: "Vacanza con il partner"},
  {name: "Andare al campo"},
  {name: "Shopping illimitato di vestiti"},
  {name: "Shopping illimitato di makeup"}
];
// -----------------------------------


let bracket = [];
let currentMatch = 0;
let winners = [];
let semifinalLosers = [];
let finalistLoser = null;
let totalMatches = items.length - 1;
let completedMatches = 0;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function buildBracket() {
  bracket = [];
  let shuffled = shuffle([...items]);
  for (let i = 0; i < shuffled.length; i += 2) {
    bracket.push([shuffled[i], shuffled[i + 1]]);
  }
}

function showMatch() {

  if (bracket.length === 1 && !bracket[0][1]) {
    showPodium(bracket[0][0]);
    return;
  }

  if (currentMatch >= bracket.length) {
    bracket = [];
    for (let i = 0; i < winners.length; i += 2) {
      bracket.push([winners[i], winners[i + 1]]);
    }
    winners = [];
    currentMatch = 0;
    showMatch();
    return;
  }

  let match = bracket[currentMatch];

  if (!match[1]) {
    winners.push(match[0]);
    currentMatch++;
    showMatch();
    return;
  }

  document.getElementById("game").innerHTML = `
    <div class="container">
      <div class="card" onclick="choose(0)">
        ${match[0].name}
      </div>
      <div class="vs">VS</div>
      <div class="card" onclick="choose(1)">
        ${match[1].name}
      </div>
    </div>
  `;
}

function choose(index) {

  let cards = document.querySelectorAll(".card");
  cards.forEach((c,i) => {
    if (i !== index) c.classList.add("fade");
  });

  setTimeout(() => {

    let match = bracket[currentMatch];
    let winner = match[index];
    let loser = match[1 - index];

    if (bracket.length === 2) {
      semifinalLosers.push(loser);
    }

    if (bracket.length === 1) {
      finalistLoser = loser;
    }

    winners.push(winner);
    currentMatch++;
    completedMatches++;
    updateProgress();
    showMatch();

  }, 200);
}

function updateProgress() {
  let percent = (completedMatches / totalMatches) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showPodium(first) {

  document.getElementById("game").innerHTML = "";

  document.getElementById("result").innerHTML = `
    <div class="podium">
      <h2>🥇 ${first.name}</h2>
      <h2>🥈 ${finalistLoser ? finalistLoser.name : ""}</h2>
      <h2>🥉 ${semifinalLosers[0] ? semifinalLosers[0].name : ""}</h2>
      <button onclick="location.reload()">Rigioca</button>
    </div>
  `;
}

buildBracket();
showMatch();

</script>

</body>
</html>
