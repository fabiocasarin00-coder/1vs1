<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #111);
  color: white;
  text-align: center;
}

h1 {
  margin: 20px 0 10px 0;
}

.progress {
  width: 80%;
  height: 8px;
  background: #333;
  margin: 10px auto 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00f5a0, #00d9f5);
  transition: width 0.3s;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 10px;
}

.card {
  width: 42%;
  cursor: pointer;
  border-radius: 20px;
  overflow: hidden;
  background: #1c1c2b;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  transition: transform 0.2s, opacity 0.3s;
}

.card:hover { transform: scale(1.05); }

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
  margin: 0;
}

.vs {
  font-size: 20px;
  font-weight: bold;
  opacity: 0.6;
}

.fade { opacity: 0.3; }

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: linear-gradient(90deg, #00f5a0, #00d9f5);
  color: black;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🏆 Torneo</h1>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="game"></div>
<div id="result"></div>

<script>

// ----- PERSONALIZZA QUI -----
let items = [
  {name: "Pizza", img: "https://source.unsplash.com/600x600/?pizza"},
  {name: "Sushi", img: "https://source.unsplash.com/600x600/?sushi"},
  {name: "Mare", img: "https://source.unsplash.com/600x600/?sea"},
  {name: "Montagna", img: "https://source.unsplash.com/600x600/?mountain"},
  {name: "Cinema", img: "https://source.unsplash.com/600x600/?cinema"},
  {name: "Videogiochi", img: "https://source.unsplash.com/600x600/?gaming"},
  {name: "Estate", img: "https://source.unsplash.com/600x600/?summer"},
  {name: "Inverno", img: "https://source.unsplash.com/600x600/?winter"}
];
// ----------------------------

let bracket = [];
let currentMatch = 0;
let winners = [];
let semifinalLosers = [];
let finalistLoser = null;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function buildBracket() {
  bracket = [];
  let shuffled = shuffle([...items]);
  for (let i = 0; i < shuffled.length; i += 2) {
    bracket.push([shuffled[i], shuffled[i + 1]]);
  }
}

function showMatch() {

  if (bracket.length === 1 && !bracket[0][1]) {
    showPodium(bracket[0][0]);
    return;
  }

  if (currentMatch >= bracket.length) {
    bracket = [];
    for (let i = 0; i < winners.length; i += 2) {
      bracket.push([winners[i], winners[i + 1]]);
    }
    winners = [];
    currentMatch = 0;
    showMatch();
    return;
  }

  let match = bracket[currentMatch];

  if (!match[1]) {
    winners.push(match[0]);
    currentMatch++;
    showMatch();
    return;
  }

  document.getElementById("game").innerHTML = `
    <div class="container">
      <div class="card" onclick="choose(0)">
        <img src="${match[0].img}">
        <h3>${match[0].name}</h3>
      </div>
      <div class="vs">VS</div>
      <div class="card" onclick="choose(1)">
        <img src="${match[1].img}">
        <h3>${match[1].name}</h3>
      </div>
    </div>
  `;
}

function choose(index) {

  let match = bracket[currentMatch];
  let winner = match[index];
  let loser = match[1 - index];

  if (bracket.length === 2) {
    semifinalLosers.push(loser);
  }

  if (bracket.length === 1) {
    finalistLoser = loser;
  }

  winners.push(winner);
  currentMatch++;

  updateProgress();
  showMatch();
}

function updateProgress() {
  let total = items.length - 1;
  let done = winners.length + currentMatch;
  let percent = (done / total) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showPodium(first) {

  document.getElementById("game").innerHTML = "";

  document.getElementById("result").innerHTML = `
    <h2>🥇 ${first.name}</h2>
    <h3>🥈 ${finalistLoser ? finalistLoser.name : ""}</h3>
    <h3>🥉 ${semifinalLosers[0] ? semifinalLosers[0].name : ""}</h3>
    <button onclick="location.reload()">Rigioca</button>
  `;
}

buildBracket();
showMatch();

</script>

</body>
</html>
